<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Produits disponibles</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    #products-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }
    .product-card {
      border: 1px solid #ddd;
      padding: 15px;
      width: 250px;
      text-align: center;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }
    .product-image {
      max-width: 100%;
      height: auto;
    }
    .product-title {
      font-size: 18px;
      font-weight: bold;
    }
    .product-price {
      color: green;
      font-size: 16px;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <h1>Nos produits disponibles</h1>
  <div id="products-container"></div>

  <script src="products.js"></script>
</body>
</html>
